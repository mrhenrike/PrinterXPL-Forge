# Author: Andre Henrique (@mrhenrike) | Uniao Geek - https://github.com/Uniao-Geek
#
# Auto-publish printerxpl-forge to PyPI when the version in pyproject.toml
# is not yet available on PyPI.
#
# Flow:
#   push to master  ->  read version  ->  check PyPI  ->  if new: build + tag + publish
#   push of v* tag  ->  build + publish (direct release path)
#   workflow_dispatch  ->  dry-run on TestPyPI
#
# Security model:
#   - Publishing uses OIDC Trusted Publisher ONLY (no API tokens in workflow)
#   - All publish jobs guard on github.repository to prevent fork execution
#   - The PyPI Trusted Publisher is bound to mrhenrike/PrinterXPL-Forge + this file + environment pypi
#
# One-time PyPI setup: https://pypi.org/manage/account/publishing/
#   PyPI project name : printerxpl-forge
#   GitHub owner      : mrhenrike
#   GitHub repo       : PrinterXPL-Forge
#   Workflow file     : publish-pypi.yml
#   Environment       : pypi

name: publish-pypi

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  version-check:
    name: "Check version vs PyPI"
    if: github.repository == 'mrhenrike/PrinterXPL-Forge'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      should_publish: ${{ steps.check.outputs.should_publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from pyproject.toml
        id: read
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version exists on PyPI
        id: check
        run: |
          VERSION="${{ steps.read.outputs.version }}"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/printerxpl-forge/$VERSION/json")
          if [ "$HTTP" = "200" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already on PyPI - skipping."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION not on PyPI - will publish."
          fi

  publish:
    name: "Build and publish to PyPI"
    needs: version-check
    if: |
      needs.version-check.outputs.should_publish == 'true' &&
      github.repository == 'mrhenrike/PrinterXPL-Forge'
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build distributions
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Tag release
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          git config user.name "Andre Henrique"
          git config user.email "mrhenrike@users.noreply.github.com"
          git tag "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

  testpypi:
    name: "Dry-run on TestPyPI"
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.repository == 'mrhenrike/PrinterXPL-Forge'
    runs-on: ubuntu-latest
    environment: testpypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build distributions
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
