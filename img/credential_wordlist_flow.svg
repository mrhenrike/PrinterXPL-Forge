<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#388bfd"/>
    </marker>
    <marker id="arrY" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d29922"/>
    </marker>
  </defs>

  <rect width="860" height="360" fill="url(#bg4)" rx="12"/>
  <rect width="860" height="360" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold">Wordlist-Driven Credential Architecture (v3.7.0)</text>
  <text x="430" y="45" text-anchor="middle" fill="#8b949e" font-size="10">Zero hardcoded credentials  all data lives in external wordlist files</text>
  <line x1="40" y1="54" x2="820" y2="54" stroke="#21262d" stroke-width="1"/>

  <!-- Wordlist Files column -->
  <text x="130" y="75" text-anchor="middle" fill="#8b949e" font-size="11">WORDLIST FILES</text>

  <rect x="30" y="82" width="200" height="44" rx="7" fill="#1c2128" stroke="#3fb950" stroke-width="1.5"/>
  <text x="130" y="100" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">printer_default_creds.txt</text>
  <text x="130" y="116" text-anchor="middle" fill="#8b949e" font-size="9">195+ user:pass  sections by vendor</text>

  <rect x="30" y="134" width="200" height="44" rx="7" fill="#1c2128" stroke="#3fb950" stroke-width="1.5"/>
  <text x="130" y="152" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">snmp_communities.txt</text>
  <text x="130" y="168" text-anchor="middle" fill="#8b949e" font-size="9">community strings  vendor-specific</text>

  <rect x="30" y="186" width="200" height="44" rx="7" fill="#1c2128" stroke="#3fb950" stroke-width="1.5"/>
  <text x="130" y="204" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">ftp_creds.txt</text>
  <text x="130" y="220" text-anchor="middle" fill="#8b949e" font-size="9">FTP user:pass for printer file servers</text>

  <rect x="30" y="238" width="200" height="44" rx="7" fill="#1c2128" stroke="#3fb950" stroke-width="1.5"/>
  <text x="130" y="256" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">pjl_passwords.txt</text>
  <text x="130" y="272" text-anchor="middle" fill="#8b949e" font-size="9">PJL protection bypass passwords</text>

  <!-- Custom wordlist box -->
  <rect x="30" y="295" width="200" height="44" rx="7" fill="#1c2128" stroke="#d29922" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="130" y="313" text-anchor="middle" fill="#d29922" font-size="10" font-weight="bold">--bf-wordlist &lt;custom&gt;</text>
  <text x="130" y="329" text-anchor="middle" fill="#8b949e" font-size="9">replaces default wordlist entirely</text>

  <!-- Arrows from wordlist files to loader -->
  <line x1="230" y1="104" x2="305" y2="170" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="230" y1="156" x2="305" y2="180" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="230" y1="208" x2="305" y2="192" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="230" y1="260" x2="305" y2="202" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="230" y1="317" x2="305" y2="210" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrY)"/>

  <!-- Wordlist Loader box (center) -->
  <rect x="305" y="120" width="190" height="110" rx="10" fill="#1c2128" stroke="#388bfd" stroke-width="2"/>
  <rect x="305" y="120" width="190" height="30" rx="10" fill="#388bfd"/>
  <rect x="305" y="138" width="190" height="12" fill="#388bfd"/>
  <text x="400" y="140" text-anchor="middle" fill="#0d1117" font-size="12" font-weight="bold">wordlist_loader.py</text>
  <text x="400" y="164" text-anchor="middle" fill="#8b949e" font-size="9">load_for_vendor(vendor)</text>
  <text x="400" y="178" text-anchor="middle" fill="#8b949e" font-size="9">load_snmp_communities()</text>
  <text x="400" y="192" text-anchor="middle" fill="#8b949e" font-size="9">load_ftp_creds()</text>
  <text x="400" y="206" text-anchor="middle" fill="#8b949e" font-size="9">wordlist_stats() · auto-locate</text>
  <text x="400" y="220" text-anchor="middle" fill="#6e7681" font-size="8">auto-finds default path if none given</text>

  <!-- Token resolver box -->
  <rect x="305" y="250" width="190" height="80" rx="8" fill="#1c2128" stroke="#d29922" stroke-width="1.5"/>
  <text x="400" y="270" text-anchor="middle" fill="#d29922" font-size="10" font-weight="bold">Token Expansion</text>
  <text x="400" y="287" text-anchor="middle" fill="#8b949e" font-size="9">__SERIAL__  ’ XAABT77481</text>
  <text x="400" y="302" text-anchor="middle" fill="#8b949e" font-size="9">__MAC6__   ’ AA:BB:CC last 6</text>
  <text x="400" y="317" text-anchor="middle" fill="#8b949e" font-size="9">__MAC12__  ’ full MAC, no ':'</text>

  <!-- Arrow from loader to token -->
  <line x1="400" y1="230" x2="400" y2="248" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrY)"/>

  <!-- Arrows from loader to BF protocols -->
  <line x1="495" y1="170" x2="570" y2="120" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="495" y1="185" x2="570" y2="183" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="495" y1="200" x2="570" y2="248" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="495" y1="290" x2="570" y2="308" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrY)"/>

  <!-- BF Protocol boxes (right) -->
  <text x="700" y="75" text-anchor="middle" fill="#8b949e" font-size="11">BRUTEFORCE PROTOCOLS</text>

  <rect x="570" y="82" width="260" height="44" rx="7" fill="#1c2128" stroke="#388bfd" stroke-width="1.5"/>
  <text x="700" y="100" text-anchor="middle" fill="#388bfd" font-size="10" font-weight="bold">HTTP / HTTPS :80 :443 :8080</text>
  <text x="700" y="116" text-anchor="middle" fill="#8b949e" font-size="9">Basic Auth · Digest · Form POST</text>

  <rect x="570" y="162" width="260" height="44" rx="7" fill="#1c2128" stroke="#388bfd" stroke-width="1.5"/>
  <text x="700" y="180" text-anchor="middle" fill="#388bfd" font-size="10" font-weight="bold">SNMP UDP :161</text>
  <text x="700" y="196" text-anchor="middle" fill="#8b949e" font-size="9">community string enumeration</text>

  <rect x="570" y="230" width="260" height="44" rx="7" fill="#1c2128" stroke="#388bfd" stroke-width="1.5"/>
  <text x="700" y="248" text-anchor="middle" fill="#388bfd" font-size="10" font-weight="bold">FTP :21</text>
  <text x="700" y="264" text-anchor="middle" fill="#8b949e" font-size="9">printer file server login</text>

  <rect x="570" y="295" width="260" height="44" rx="7" fill="#1c2128" stroke="#d29922" stroke-width="1.5"/>
  <text x="700" y="313" text-anchor="middle" fill="#d29922" font-size="10" font-weight="bold">Telnet :23</text>
  <text x="700" y="329" text-anchor="middle" fill="#8b949e" font-size="9">shell prompt detection</text>

  <!-- Variation engine note -->
  <rect x="570" y="122" width="260" height="34" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="700" y="136" text-anchor="middle" fill="#6e7681" font-size="9">Variation engine (per-password):</text>
  <text x="700" y="150" text-anchor="middle" fill="#6e7681" font-size="9">normal · reverse · leet · CamelCase · UPPER · lower · reverse+leet</text>
</svg>
