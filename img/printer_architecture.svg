<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2128"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>
  <rect width="900" height="520" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">Printer Attack Surface  What Can Be Exploited</text>
  <line x1="60" y1="48" x2="840" y2="48" stroke="#21262d" stroke-width="1"/>

  <!-- ATTACKER box (left) -->
  <rect x="30" y="80" width="140" height="56" rx="8" fill="#1c2128" stroke="#388bfd" stroke-width="1.5"/>
  <text x="100" y="103" text-anchor="middle" fill="#388bfd" font-size="12" font-weight="bold">ATTACKER</text>
  <text x="100" y="122" text-anchor="middle" fill="#8b949e" font-size="10">network / insider</text>

  <!-- Protocol channels (left side) -->
  <!-- RAW 9100 -->
  <rect x="30" y="160" width="140" height="28" rx="5" fill="#1c2128" stroke="#3fb950" stroke-width="1"/>
  <text x="100" y="179" text-anchor="middle" fill="#3fb950" font-size="11">RAW :9100</text>

  <!-- IPP 631 -->
  <rect x="30" y="196" width="140" height="28" rx="5" fill="#1c2128" stroke="#3fb950" stroke-width="1"/>
  <text x="100" y="215" text-anchor="middle" fill="#3fb950" font-size="11">IPP :631</text>

  <!-- LPD 515 -->
  <rect x="30" y="232" width="140" height="28" rx="5" fill="#1c2128" stroke="#3fb950" stroke-width="1"/>
  <text x="100" y="251" text-anchor="middle" fill="#3fb950" font-size="11">LPD :515</text>

  <!-- SMB 445 -->
  <rect x="30" y="268" width="140" height="28" rx="5" fill="#1c2128" stroke="#d29922" stroke-width="1"/>
  <text x="100" y="287" text-anchor="middle" fill="#d29922" font-size="11">SMB :445</text>

  <!-- HTTP 80 -->
  <rect x="30" y="304" width="140" height="28" rx="5" fill="#1c2128" stroke="#d29922" stroke-width="1"/>
  <text x="100" y="323" text-anchor="middle" fill="#d29922" font-size="11">HTTP :80 / EWS</text>

  <!-- SNMP 161 -->
  <rect x="30" y="340" width="140" height="28" rx="5" fill="#1c2128" stroke="#f85149" stroke-width="1"/>
  <text x="100" y="359" text-anchor="middle" fill="#f85149" font-size="11">SNMP :161 UDP</text>

  <!-- FTP 21 -->
  <rect x="30" y="376" width="140" height="28" rx="5" fill="#1c2128" stroke="#f85149" stroke-width="1"/>
  <text x="100" y="395" text-anchor="middle" fill="#f85149" font-size="11">FTP :21</text>

  <!-- Telnet 23 -->
  <rect x="30" y="412" width="140" height="28" rx="5" fill="#1c2128" stroke="#f85149" stroke-width="1"/>
  <text x="100" y="431" text-anchor="middle" fill="#f85149" font-size="11">Telnet :23</text>

  <!-- Arrow from attacker to protocols -->
  <line x1="100" y1="136" x2="100" y2="155" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Arrows from protocols to printer (horizontal lines) -->
  <line x1="170" y1="174" x2="280" y2="174" stroke="#3fb950" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="170" y1="210" x2="280" y2="210" stroke="#3fb950" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="170" y1="246" x2="280" y2="246" stroke="#3fb950" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="170" y1="282" x2="280" y2="282" stroke="#d29922" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="170" y1="318" x2="280" y2="318" stroke="#d29922" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="170" y1="354" x2="280" y2="354" stroke="#f85149" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="170" y1="390" x2="280" y2="390" stroke="#f85149" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="170" y1="426" x2="280" y2="426" stroke="#f85149" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- PRINTER main box -->
  <rect x="280" y="68" width="360" height="400" rx="12" fill="url(#boxGrad)" stroke="#30363d" stroke-width="2"/>
  <text x="460" y="93" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold">NETWORK PRINTER</text>
  <line x1="300" y1="100" x2="620" y2="100" stroke="#21262d" stroke-width="1"/>

  <!-- Language interpreters inside printer -->
  <!-- PJL -->
  <rect x="310" y="112" width="150" height="56" rx="7" fill="#1c2128" stroke="#388bfd" stroke-width="1.5" filter="url(#glow)"/>
  <text x="385" y="134" text-anchor="middle" fill="#388bfd" font-size="12" font-weight="bold">PJL Interpreter</text>
  <text x="385" y="152" text-anchor="middle" fill="#8b949e" font-size="10">Job control · NVRAM · FS</text>

  <!-- PostScript -->
  <rect x="310" y="180" width="150" height="56" rx="7" fill="#1c2128" stroke="#388bfd" stroke-width="1.5" filter="url(#glow)"/>
  <text x="385" y="202" text-anchor="middle" fill="#388bfd" font-size="12" font-weight="bold">PS Interpreter</text>
  <text x="385" y="220" text-anchor="middle" fill="#8b949e" font-size="10">Turing-complete · DoS · Overlay</text>

  <!-- PCL/PDF -->
  <rect x="310" y="248" width="150" height="56" rx="7" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>
  <text x="385" y="270" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="bold">PCL / PDF</text>
  <text x="385" y="288" text-anchor="middle" fill="#6e7681" font-size="10">Macro FS · Virtual volumes</text>

  <!-- ESC/P -->
  <rect x="310" y="316" width="150" height="40" rx="7" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>
  <text x="385" y="342" text-anchor="middle" fill="#8b949e" font-size="11">ESC/P · ESC/POS</text>

  <!-- EWS / HTTP admin -->
  <rect x="310" y="368" width="150" height="40" rx="7" fill="#1c2128" stroke="#d29922" stroke-width="1"/>
  <text x="385" y="394" text-anchor="middle" fill="#d29922" font-size="11">EWS (HTTP Admin)</text>

  <!-- Printing Unit -->
  <rect x="470" y="140" width="150" height="210" rx="7" fill="#1c2128" stroke="#21262d" stroke-width="1.5"/>
  <text x="545" y="165" text-anchor="middle" fill="#6e7681" font-size="12">Printing</text>
  <text x="545" y="183" text-anchor="middle" fill="#6e7681" font-size="12">Unit</text>
  <rect x="490" y="195" width="110" height="140" rx="5" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <!-- Simulated page lines -->
  <line x1="500" y1="215" x2="590" y2="215" stroke="#21262d" stroke-width="1"/>
  <line x1="500" y1="225" x2="580" y2="225" stroke="#21262d" stroke-width="1"/>
  <line x1="500" y1="235" x2="590" y2="235" stroke="#21262d" stroke-width="1"/>
  <line x1="500" y1="245" x2="570" y2="245" stroke="#21262d" stroke-width="1"/>
  <line x1="500" y1="255" x2="590" y2="255" stroke="#21262d" stroke-width="1"/>
  <line x1="500" y1="265" x2="575" y2="265" stroke="#21262d" stroke-width="1"/>
  <line x1="500" y1="285" x2="590" y2="285" stroke="#f85149" stroke-width="1.5"/>
  <line x1="500" y1="295" x2="580" y2="295" stroke="#f85149" stroke-width="1.5"/>
  <text x="545" y="320" text-anchor="middle" fill="#f85149" font-size="9">CAPTURED JOB</text>

  <!-- Arrows from interpreters to printing unit -->
  <line x1="460" y1="140" x2="470" y2="200" stroke="#21262d" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="460" y1="208" x2="470" y2="230" stroke="#21262d" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="460" y1="276" x2="470" y2="245" stroke="#21262d" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- IMPACT boxes (right side) -->
  <!-- DoS -->
  <rect x="680" y="80" width="190" height="50" rx="7" fill="#1c2128" stroke="#f85149" stroke-width="1.5"/>
  <text x="775" y="101" text-anchor="middle" fill="#f85149" font-size="12" font-weight="bold">Denial of Service</text>
  <text x="775" y="118" text-anchor="middle" fill="#8b949e" font-size="10">infinite loop · NVRAM damage · offline</text>

  <!-- Protection Bypass -->
  <rect x="680" y="145" width="190" height="50" rx="7" fill="#1c2128" stroke="#d29922" stroke-width="1.5"/>
  <text x="775" y="166" text-anchor="middle" fill="#d29922" font-size="12" font-weight="bold">Protection Bypass</text>
  <text x="775" y="183" text-anchor="middle" fill="#8b949e" font-size="10">factory reset · auth bypass · SNMP SET</text>

  <!-- Job Manipulation -->
  <rect x="680" y="210" width="190" height="50" rx="7" fill="#1c2128" stroke="#d29922" stroke-width="1.5"/>
  <text x="775" y="231" text-anchor="middle" fill="#d29922" font-size="12" font-weight="bold">Job Manipulation</text>
  <text x="775" y="248" text-anchor="middle" fill="#8b949e" font-size="10">overlay · replace · capture · exfil</text>

  <!-- Info Disclosure -->
  <rect x="680" y="275" width="190" height="50" rx="7" fill="#1c2128" stroke="#388bfd" stroke-width="1.5"/>
  <text x="775" y="296" text-anchor="middle" fill="#388bfd" font-size="12" font-weight="bold">Info Disclosure</text>
  <text x="775" y="313" text-anchor="middle" fill="#8b949e" font-size="10">filesystem · NVRAM · credentials · jobs</text>

  <!-- Lateral Movement -->
  <rect x="680" y="340" width="190" height="50" rx="7" fill="#1c2128" stroke="#3fb950" stroke-width="1.5"/>
  <text x="775" y="361" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Lateral Movement</text>
  <text x="775" y="378" text-anchor="middle" fill="#8b949e" font-size="10">SSRF pivot · LDAP hash · network map</text>

  <!-- Credential Brute Force -->
  <rect x="680" y="405" width="190" height="50" rx="7" fill="#1c2128" stroke="#3fb950" stroke-width="1.5"/>
  <text x="775" y="426" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Credential Attack</text>
  <text x="775" y="443" text-anchor="middle" fill="#8b949e" font-size="10">HTTP · FTP · SNMP · Telnet BF</text>

  <!-- Arrows from printer to impact boxes -->
  <line x1="640" y1="105" x2="680" y2="105" stroke="#f85149" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="640" y1="170" x2="680" y2="170" stroke="#d29922" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="640" y1="235" x2="680" y2="235" stroke="#d29922" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="640" y1="300" x2="680" y2="300" stroke="#388bfd" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="640" y1="365" x2="680" y2="365" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="640" y1="430" x2="680" y2="430" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Legend -->
  <rect x="30" y="472" width="840" height="36" rx="6" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <circle cx="55" cy="490" r="5" fill="#3fb950"/>
  <text x="68" y="494" fill="#8b949e" font-size="10">Print channels (RAW/IPP/LPD)</text>
  <circle cx="230" cy="490" r="5" fill="#d29922"/>
  <text x="243" y="494" fill="#8b949e" font-size="10">Management (HTTP/SMB)</text>
  <circle cx="390" cy="490" r="5" fill="#f85149"/>
  <text x="403" y="494" fill="#8b949e" font-size="10">High-risk (SNMP/FTP/Telnet)</text>
  <circle cx="575" cy="490" r="5" fill="#388bfd"/>
  <text x="588" y="494" fill="#8b949e" font-size="10">Primary targets (PJL/PS)</text>
  <text x="840" y="494" text-anchor="end" fill="#6e7681" font-size="9">PrinterReaper v3.7.0</text>
</svg>
