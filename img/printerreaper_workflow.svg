<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#388bfd"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="340" fill="url(#bg2)" rx="12"/>
  <rect width="1000" height="340" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="bold">PrinterReaper  Operational Workflow</text>
  <line x1="40" y1="42" x2="960" y2="42" stroke="#21262d" stroke-width="1"/>

  <!-- Phase boxes -->
  <!-- 1: DISCOVER -->
  <rect x="30" y="60" width="140" height="200" rx="10" fill="#1c2128" stroke="#388bfd" stroke-width="2"/>
  <rect x="30" y="60" width="140" height="32" rx="10" fill="#388bfd"/>
  <rect x="30" y="80" width="140" height="12" rx="0" fill="#388bfd"/>
  <text x="100" y="82" text-anchor="middle" fill="#0d1117" font-size="13" font-weight="bold">1  DISCOVER</text>
  <text x="100" y="112" text-anchor="middle" fill="#8b949e" font-size="10">SNMP sweep</text>
  <text x="100" y="128" text-anchor="middle" fill="#8b949e" font-size="10">--discover-local</text>
  <text x="100" y="144" text-anchor="middle" fill="#8b949e" font-size="10">Shodan / Censys</text>
  <text x="100" y="160" text-anchor="middle" fill="#8b949e" font-size="10">WSD discovery</text>
  <text x="100" y="176" text-anchor="middle" fill="#8b949e" font-size="10">IPv4 + IPv6</text>
  <text x="100" y="200" text-anchor="middle" fill="#6e7681" font-size="9" font-style="italic">output: IP list</text>
  <text x="100" y="216" text-anchor="middle" fill="#6e7681" font-size="9" font-style="italic">vendor / model</text>
  <text x="100" y="232" text-anchor="middle" fill="#6e7681" font-size="9" font-style="italic">open ports</text>

  <!-- Arrow 1’2 -->
  <line x1="170" y1="160" x2="195" y2="160" stroke="#388bfd" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2: FINGERPRINT -->
  <rect x="195" y="60" width="145" height="200" rx="10" fill="#1c2128" stroke="#388bfd" stroke-width="2"/>
  <rect x="195" y="60" width="145" height="32" rx="10" fill="#388bfd"/>
  <rect x="195" y="80" width="145" height="12" rx="0" fill="#388bfd"/>
  <text x="268" y="82" text-anchor="middle" fill="#0d1117" font-size="13" font-weight="bold">2  FINGERPRINT</text>
  <text x="268" y="112" text-anchor="middle" fill="#8b949e" font-size="10">Banner grab HTTP</text>
  <text x="268" y="128" text-anchor="middle" fill="#8b949e" font-size="10">IPP attr query</text>
  <text x="268" y="144" text-anchor="middle" fill="#8b949e" font-size="10">SNMP sysDescr</text>
  <text x="268" y="160" text-anchor="middle" fill="#8b949e" font-size="10">PJL INFO ID</text>
  <text x="268" y="176" text-anchor="middle" fill="#8b949e" font-size="10">ML fingerprint</text>
  <text x="268" y="200" text-anchor="middle" fill="#6e7681" font-size="9" font-style="italic">--scan / --scan-ml</text>
  <text x="268" y="216" text-anchor="middle" fill="#6e7681" font-size="9" font-style="italic">vendor · model</text>
  <text x="268" y="232" text-anchor="middle" fill="#6e7681" font-size="9" font-style="italic">serial · firmware</text>

  <!-- Arrow 2’3 -->
  <line x1="340" y1="160" x2="365" y2="160" stroke="#388bfd" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3: ASSESS -->
  <rect x="365" y="60" width="145" height="200" rx="10" fill="#1c2128" stroke="#d29922" stroke-width="2"/>
  <rect x="365" y="60" width="145" height="32" rx="10" fill="#d29922"/>
  <rect x="365" y="80" width="145" height="12" rx="0" fill="#d29922"/>
  <text x="438" y="82" text-anchor="middle" fill="#0d1117" font-size="13" font-weight="bold">3  ASSESS</text>
  <text x="438" y="112" text-anchor="middle" fill="#8b949e" font-size="10">NVD CVE lookup</text>
  <text x="438" y="128" text-anchor="middle" fill="#8b949e" font-size="10">Exploit matching</text>
  <text x="438" y="144" text-anchor="middle" fill="#8b949e" font-size="10">Attack surface score</text>
  <text x="438" y="160" text-anchor="middle" fill="#8b949e" font-size="10">Protocol detection</text>
  <text x="438" y="176" text-anchor="middle" fill="#8b949e" font-size="10">Language detection</text>
  <text x="438" y="200" text-anchor="middle" fill="#6e7681" font-size="9" font-style="italic">CVEs · CVSS scores</text>
  <text x="438" y="216" text-anchor="middle" fill="#6e7681" font-size="9" font-style="italic">exploit IDs</text>
  <text x="438" y="232" text-anchor="middle" fill="#6e7681" font-size="9" font-style="italic">risk priority</text>

  <!-- Arrow 3’4 -->
  <line x1="510" y1="160" x2="535" y2="160" stroke="#d29922" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- 4: EXPLOIT -->
  <rect x="535" y="60" width="145" height="200" rx="10" fill="#1c2128" stroke="#f85149" stroke-width="2"/>
  <rect x="535" y="60" width="145" height="32" rx="10" fill="#f85149"/>
  <rect x="535" y="80" width="145" height="12" rx="0" fill="#f85149"/>
  <text x="608" y="82" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">4  EXPLOIT</text>
  <text x="608" y="112" text-anchor="middle" fill="#8b949e" font-size="10">PJL / PS / PCL cmds</text>
  <text x="608" y="128" text-anchor="middle" fill="#8b949e" font-size="10">--bruteforce BF login</text>
  <text x="608" y="144" text-anchor="middle" fill="#8b949e" font-size="10">--attack-matrix</text>
  <text x="608" y="160" text-anchor="middle" fill="#8b949e" font-size="10">--xpl-run &lt;ID&gt;</text>
  <text x="608" y="176" text-anchor="middle" fill="#8b949e" font-size="10">--firmware implant</text>
  <text x="608" y="200" text-anchor="middle" fill="#6e7681" font-size="9" font-style="italic">39+ exploit modules</text>
  <text x="608" y="216" text-anchor="middle" fill="#6e7681" font-size="9" font-style="italic">dry-run safe</text>
  <text x="608" y="232" text-anchor="middle" fill="#6e7681" font-size="9" font-style="italic">--no-dry for live</text>

  <!-- Arrow 4’5 -->
  <line x1="680" y1="160" x2="705" y2="160" stroke="#f85149" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- 5: PIVOT -->
  <rect x="705" y="60" width="145" height="200" rx="10" fill="#1c2128" stroke="#3fb950" stroke-width="2"/>
  <rect x="705" y="60" width="145" height="32" rx="10" fill="#3fb950"/>
  <rect x="705" y="80" width="145" height="12" rx="0" fill="#3fb950"/>
  <text x="778" y="82" text-anchor="middle" fill="#0d1117" font-size="13" font-weight="bold">5  PIVOT</text>
  <text x="778" y="112" text-anchor="middle" fill="#8b949e" font-size="10">--pivot SSRF</text>
  <text x="778" y="128" text-anchor="middle" fill="#8b949e" font-size="10">--network-map</text>
  <text x="778" y="144" text-anchor="middle" fill="#8b949e" font-size="10">LDAP hash capture</text>
  <text x="778" y="160" text-anchor="middle" fill="#8b949e" font-size="10">subnet discovery</text>
  <text x="778" y="176" text-anchor="middle" fill="#8b949e" font-size="10">WSD neighbor enum</text>
  <text x="778" y="200" text-anchor="middle" fill="#6e7681" font-size="9" font-style="italic">routing table</text>
  <text x="778" y="216" text-anchor="middle" fill="#6e7681" font-size="9" font-style="italic">ARP cache</text>
  <text x="778" y="232" text-anchor="middle" fill="#6e7681" font-size="9" font-style="italic">attack paths</text>

  <!-- Arrow 5’6 -->
  <line x1="850" y1="160" x2="875" y2="160" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- 6: REPORT -->
  <rect x="875" y="60" width="95" height="200" rx="10" fill="#1c2128" stroke="#6e7681" stroke-width="2"/>
  <rect x="875" y="60" width="95" height="32" rx="10" fill="#6e7681"/>
  <rect x="875" y="80" width="95" height="12" rx="0" fill="#6e7681"/>
  <text x="923" y="82" text-anchor="middle" fill="#0d1117" font-size="11" font-weight="bold">6  REPORT</text>
  <text x="923" y="112" text-anchor="middle" fill="#8b949e" font-size="9">JSON log</text>
  <text x="923" y="128" text-anchor="middle" fill="#8b949e" font-size="9">terminal log</text>
  <text x="923" y="144" text-anchor="middle" fill="#8b949e" font-size="9">handoff.md</text>
  <text x="923" y="160" text-anchor="middle" fill="#8b949e" font-size="9">CVE list</text>
  <text x="923" y="176" text-anchor="middle" fill="#8b949e" font-size="9">found creds</text>
  <text x="923" y="200" text-anchor="middle" fill="#6e7681" font-size="8" font-style="italic">.log/</text>
  <text x="923" y="214" text-anchor="middle" fill="#6e7681" font-size="8" font-style="italic">terminal-</text>
  <text x="923" y="228" text-anchor="middle" fill="#6e7681" font-size="8" font-style="italic">output.log</text>

  <!-- Bottom bar -->
  <rect x="30" y="278" width="940" height="46" rx="7" fill="#1c2128" stroke="#21262d" stroke-width="1"/>
  <text x="500" y="296" text-anchor="middle" fill="#8b949e" font-size="11">Every phase logs to</text>
  <text x="500" y="312" text-anchor="middle" fill="#388bfd" font-size="11">.log/terminal-output.log  ·  .log/handoff.md</text>
  <text x="970" y="312" text-anchor="end" fill="#6e7681" font-size="9">PrinterReaper v3.7.0</text>
</svg>
